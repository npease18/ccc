name: Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Prepare release metadata
        shell: bash
        run: |
          mkdir -p dist
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=main-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build server binary
        env:
          COMMIT_HASH: ${{ github.sha }}
        run: bun build --compile --outfile dist/ccc-server-linux-x64 ./mcp-server/index.ts

      - name: Build client binary
        env:
          COMMIT_HASH: ${{ github.sha }}
        run: bun build --compile --outfile dist/ccc-client-linux-x64 ./client/index.ts

      - name: Generate checksums
        shell: bash
        run: sha256sum dist/ccc-server-linux-x64 dist/ccc-client-linux-x64 > dist/SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: main @ ${{ env.SHORT_SHA }}
          body: |
            Automated release for commit `${{ github.sha }}`.

            Commit URL:
            https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          files: |
            dist/ccc-server-linux-x64
            dist/ccc-client-linux-x64
            dist/SHA256SUMS
